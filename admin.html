<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HarouDev Admin</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="css/admin.css">
</head>

<body>

  <!-- ═══ LOGIN GATE ═══ -->
  <div class="login-gate" id="loginGate">
    <div class="login-card" id="loginCard">
      <h1>HarouDev</h1>
      <p>Admin Panel</p>
      <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="off">
      <button class="btn-login" id="loginBtn">Enter</button>
      <p class="login-error" id="loginError">Wrong password</p>
    </div>
  </div>

  <!-- ═══ DASHBOARD ═══ -->
  <div class="dashboard" id="dashboard">

    <!-- Header -->
    <div class="dash-header">
      <h1>HarouDev Admin</h1>
      <div class="dash-header-actions">
        <a href="index.html" target="_blank" class="btn-sm" id="previewBtn">🖥 Preview Site</a>
        <button class="btn-sm" id="toggleSidebar">☰ Menu</button>
        <button class="btn-sm danger" id="logoutBtn">Logout</button>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <button class="sidebar-btn active" data-panel="settings">⚙️ Site Settings</button>
      <button class="sidebar-btn" data-panel="games">🎮 Games</button>
    </aside>

    <!-- Main -->
    <main class="dash-main">

      <!-- ── SETTINGS PANEL ── -->
      <div class="panel active" id="panel-settings">
        <h2 class="panel-title">Site Settings</h2>
        <div class="form-group">
          <label for="setSubtitle">Hero Subtitle</label>
          <input type="text" id="setSubtitle">
        </div>
        <div class="form-group">
          <label for="setBio">About Bio</label>
          <textarea id="setBio" rows="5"></textarea>
        </div>
        <div class="form-group">
          <label for="setSkills">Skills</label>
          <input type="text" id="setSkills">
          <p class="helper">Separate with commas</p>
        </div>
        <div class="form-group">
          <label for="setPhoto">Developer Photo</label>
          <input type="file" id="setPhoto" accept="image/*">
          <div id="photoPreview"></div>
        </div>
        <div class="form-group">
          <label for="setContact">Contact Text</label>
          <textarea id="setContact" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="setTwitter">Twitter / X URL</label>
          <input type="url" id="setTwitter">
        </div>
        <div class="form-group">
          <label for="setGithub">GitHub URL</label>
          <input type="url" id="setGithub">
        </div>
        <hr style="border-color:rgba(255,255,255,.06);margin:32px 0">
        <h3 style="margin-bottom:16px;font-size:.95rem;">Change Password</h3>
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" placeholder="Leave blank to keep current">
        </div>
        <button class="btn-save" id="saveSettingsBtn">Save Settings</button>

        <hr style="border-color:rgba(255,255,255,.06);margin:32px 0">
        <h3 style="margin-bottom:16px;font-size:.95rem;">Data Backup</h3>
        <div style="display:flex;gap:12px;flex-wrap:wrap;">
          <button class="btn-sm" id="exportBtn">📥 Export Data</button>
          <label class="btn-sm" style="cursor:pointer;">📤 Import Data <input type="file" id="importFile" accept=".json"
              style="display:none"></label>
        </div>
      </div>

      <!-- ── GAMES PANEL ── -->
      <div class="panel" id="panel-games">
        <!-- LIST VIEW -->
        <div id="gamesList">
          <div class="games-header">
            <h2 class="panel-title" style="margin-bottom:0">Games</h2>
            <button class="btn-add" id="addGameBtn">+ Add New Game</button>
          </div>
          <table class="games-table">
            <thead>
              <tr>
                <th></th>
                <th>Title</th>
                <th>Visible</th>
                <th>Pos</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="gamesTableBody"></tbody>
          </table>
        </div>
        <!-- FORM VIEW -->
        <div id="gameForm" style="display:none">
          <button class="btn-sm" id="backToList" style="margin-bottom:20px">← Back to list</button>
          <h2 class="panel-title" id="gameFormTitle">Add Game</h2>
          <input type="hidden" id="gameId">
          <div class="form-group">
            <label for="gameTitle">Title *</label>
            <input type="text" id="gameTitle" required>
          </div>
          <div class="form-group">
            <label for="gameDesc">Description</label>
            <textarea id="gameDesc" maxlength="150" rows="3"></textarea>
            <p class="char-counter"><span id="charCount">0</span>/150</p>
          </div>
          <div class="form-group">
            <label for="gameCover">Cover Image</label>
            <input type="file" id="gameCover" accept="image/*">
            <div id="coverPreview"></div>
          </div>
          <div class="form-group">
            <label for="gameUrl">App Store URL</label>
            <input type="url" id="gameUrl">
          </div>
          <div class="form-group">
            <label for="gamePos">Position</label>
            <input type="number" id="gamePos" value="0" min="0">
          </div>
          <div class="form-group">
            <label>Visible</label>
            <div class="toggle-wrap">
              <label class="toggle"><input type="checkbox" id="gameVisible" checked><span
                  class="toggle-slider"></span></label>
              <span id="visibleLabel">Visible</span>
            </div>
          </div>
          <button class="btn-save" id="saveGameBtn">Save Game</button>
        </div>
      </div>

    </main>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/db.js"></script>
  <script src="js/admin.js"></script>
</body>

</html>
